<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Login — Auto Pottery Bill</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);}
    input{font-size:16px!important;}
    .login-wrap{width:100%;max-width:380px;}
  </style>
</head>
<body>

<div class="login-wrap">

  <!-- Hero -->
  <div class="float-up text-center mb-8">
    <div style="width:64px;height:64px;border-radius:20px;background:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 24px rgba(79,70,229,.35);margin-bottom:16px;">🏺</div>
    <h1 style="font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:1.6rem;font-weight:800;color:var(--text);line-height:1.2;letter-spacing:-.3px;">Auto Pottery Bill</h1>
    <p style="color:var(--text3);font-size:.875rem;margin-top:5px;">HK.pvt.Ltd · Billing System</p>
  </div>

  <!-- Card -->
  <div class="float-up-2 c-card" style="border-radius:20px;padding:28px;">

    {% if error %}
    <div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:10px 14px;color:#DC2626;font-size:.85rem;font-weight:500;margin-bottom:20px;">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" autocomplete="on">
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;">Username</label>
        <input name="username" type="text" required autofocus autocomplete="username" placeholder="Enter your username"
               class="c-input" style="width:100%;padding:12px 16px;border-radius:12px;font-size:.9rem;"/>
      </div>
      <div style="margin-bottom:24px;">
        <label style="display:block;font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;">Password</label>
        <div style="position:relative;">
          <input name="password" type="password" id="pw" required autocomplete="current-password" placeholder="Enter your password"
                 class="c-input" style="width:100%;padding:12px 44px 12px 16px;border-radius:12px;font-size:.9rem;"/>
          <button type="button" onclick="var i=document.getElementById('pw');i.type=i.type=='password'?'text':'password';"
                  style="position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:3px;line-height:1;">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;padding:13px;border-radius:12px;font-size:.95rem;font-weight:700;font-family:Inter,sans-serif;letter-spacing:.2px;">
        Sign In →
      </button>
    </form>

    <p class="float-up-3" style="text-align:center;font-size:.78rem;color:var(--text3);margin-top:18px;">Auto Pottery Bill &copy; HK.pvt.Ltd</p>
  </div>
</div>
</body>
</html>
